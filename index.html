<style>
/* @property for smooth animated conic gradient */
@property --rot { syntax:"<angle>"; initial-value:0deg; inherits:false; }

/* ── Design tokens (overridden at runtime by JS) ── */
:root {
  --coral:#FF6B6B; --turq:#00D4C8; --pink:#FF4E9C; --purple:#9B4DFF;
  --gold:#FFD43B;  --mango:#FF9500; --lime:#7ED957;

}
*,*::before,*::after { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Nunito',sans-serif;

  /* No custom cursor needed — using default */
}
.dark { background:var(--bg-d)!important; color:var(--text-d); }

/* ── Gradient text helpers ── */
.gt-coral  { background:linear-gradient(135deg,var(--coral),var(--mango)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.gt-trio   { background:linear-gradient(135deg,var(--coral),var(--pink),var(--purple)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.gt-warm   { background:linear-gradient(135deg,var(--gold),var(--mango),var(--coral)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

/* ── Fonts ── */
.ff-fraunces { font-family:'Fraunces',Georgia,serif; }
.ff-caveat   { font-family:'Caveat',cursive; }

/* ── Section label pill ── */
.s-pill {
  display:inline-flex; align-items:center; gap:.4rem;
  padding:.32rem .95rem; border-radius:99px;
  background:rgba(255,107,107,.1); color:var(--coral);
  font-size:.78rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
}
.dark .s-pill { background:rgba(255,107,107,.18); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:linear-gradient(var(--coral),var(--pink)); border-radius:3px; }
::selection { background:rgba(255,107,107,.22); }

/* ══════════════════════════

══════════════════════════ */
@keyframes revUp    { from{opacity:0;translate:0 48px}  to{opacity:1;translate:0 0} }
@keyframes revLeft  { from{opacity:0;translate:-48px 0} to{opacity:1;translate:0 0} }
@keyframes revRight { from{opacity:0;translate:48px 0}  to{opacity:1;translate:0 0} }
@keyframes revScale { from{opacity:0;scale:.84}          to{opacity:1;scale:1}       }
.rv-up    { animation:revUp    both; animation-timeline:view(); animation-range:entry 0% entry 28%; }
.rv-left  { animation:revLeft  both; animation-timeline:view(); animation-range:entry 0% entry 28%; }
.rv-right { animation:revRight both; animation-timeline:view(); animation-range:entry 0% entry 28%; }
.rv-scale { animation:revScale both; animation-timeline:view(); animation-range:entry 0% entry 22%; }
.stg>*:nth-child(1){animation-delay:0ms}   .stg>*:nth-child(2){animation-delay:75ms}

══════════════════════════ */

.text-muted { color:#6b5c72; }       .dark .text-muted { color:#a395b5; }
.bg-light   { background:var(--bg-l); } .dark .bg-light { background:var(--bg-d); }

/* ── Language toggle active state ── */
.lang-btn-active { background:var(--coral); color:#fff; }
</style>

     APP ROOT
═══════════════════════════════════════════════════════════ -->
<body :style="`background:${dark?'var(--bg-d)':'var(--bg-l)'};color:${dark?'var(--text-d)':'var(--text-l)'}`"

<!-- ═══════════════════════════════════════════════════════════
     NAV
═══════════════════════════════════════════════════════════ -->
<nav class="nav-glass fixed top-0 left-0 right-0 z-50"
     :class="scrolled?'py-3 shadow-md':'py-4'"
     @scroll.window="scrolled=window.scrollY>48">
  <div class="max-w-7xl mx-auto px-5 flex items-center justify-between">

    <!-- Logo + panda mascot -->
    <a href="#hero" class="flex items-center gap-3 group" aria-label="Vasilisa Yummy Home">
      <!-- Panda SVG mascot -->
      <div class="relative w-10 h-10 flex-shrink-0">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"
             class="w-10 h-10 drop-shadow-sm" aria-hidden="true">
          <!-- Body -->
          <ellipse class="panda-body" cx="32" cy="44" rx="16" ry="14" fill="white"/>
          <!-- Belly -->
          <ellipse cx="32" cy="46" rx="9" ry="8" fill="#E8E8E8"/>
          <!-- Arms -->
          <ellipse class="panda-arm" cx="16" cy="48" rx="7" ry="5" fill="#1a1a1a" transform="rotate(-20 16 48)"/>
          <ellipse cx="48" cy="48" rx="7" ry="5" fill="#1a1a1a" transform="rotate(20 48 48)"/>
          <!-- Head -->
          <circle cx="32" cy="26" r="18" fill="white"/>
          <!-- Ears -->
          <circle cx="17" cy="13" r="7" fill="#1a1a1a"/>
          <circle cx="47" cy="13" r="7" fill="#1a1a1a"/>
          <circle cx="17" cy="13" r="3.5" fill="#444"/>
          <circle cx="47" cy="13" r="3.5" fill="#444"/>
          <!-- Eye patches -->
          <ellipse cx="25" cy="25" rx="6" ry="5.5" fill="#1a1a1a" transform="rotate(-10 25 25)"/>
          <ellipse cx="39" cy="25" rx="6" ry="5.5" fill="#1a1a1a" transform="rotate(10 39 25)"/>
          <!-- Eyes -->
          <g class="panda-eye"><circle cx="25" cy="25" r="2.5" fill="white"/><circle cx="26" cy="24" r="1.2" fill="#222"/></g>
          <g class="panda-eye"><circle cx="39" cy="25" r="2.5" fill="white"/><circle cx="40" cy="24" r="1.2" fill="#222"/></g>
          <!-- Blush -->
          <ellipse cx="21" cy="31" rx="4" ry="2.5" fill="#FFB3BA" opacity=".7"/>
          <ellipse cx="43" cy="31" rx="4" ry="2.5" fill="#FFB3BA" opacity=".7"/>
          <!-- Nose -->
          <ellipse cx="32" cy="30" rx="2.8" ry="2" fill="#FF6B6B"/>
          <!-- Mouth (chewing) -->
          <g class="panda-mouth">
            <path d="M27 33 Q32 38 37 33" stroke="#333" stroke-width="2" stroke-linecap="round" fill="none"/>
          </g>
          <!-- Chopstick -->
          <line x1="18" y1="36" x2="10" y2="20" stroke="#C8956B" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="22" y1="38" x2="12" y2="21" stroke="#C8956B" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Steam from mouth -->
          <path class="steam-1" d="M30 20 Q28 15 30 11" stroke="#ddd" stroke-width="2" stroke-linecap="round" fill="none" opacity=".8"/>
          <path class="steam-2" d="M34 19 Q36 14 34 10" stroke="#ddd" stroke-width="2" stroke-linecap="round" fill="none" opacity=".7"/>
        </svg>
      </div>
      <!-- Brand name -->
      <span class="ff-fraunces font-bold text-lg text-main leading-none">
        Vasilisa<span class="gt-coral"> Yummy</span>
      </span>

    <!-- Desktop nav links -->
    <nav class="hidden lg:flex items-center gap-6" aria-label="Main navigation">
      <a href="#about"         class="nav-link text-muted hover:text-main" :x-text="T('nav_about')"></a>
      <a href="#achievements"  class="nav-link text-muted hover:text-main" :x-text="T('nav_stats')"></a>
      <a href="#socials"       class="nav-link text-muted hover:text-main" :x-text="T('nav_socials')"></a>
      <a href="#mediakit"      class="nav-link text-muted hover:text-main" :x-text="T('nav_mediakit')"></a>
      <a href="#shop"          class="nav-link text-muted hover:text-main" :x-text="T('nav_shop')"></a>
      <a href="#contact"       class="nav-link text-muted hover:text-main" :x-text="T('nav_collab')"></a>
    </nav>

    <!-- Controls -->
    <div class="flex items-center gap-2">
      <!-- Language toggle -->
      <div class="flex rounded-full overflow-hidden text-xs font-bold" style="border:1.5px solid rgba(255,107,107,.28);" role="group" aria-label="Language switcher">
        <button @click="switchLang('en')" class="px-3 py-1.5 transition-all" :class="lang==='en'?'lang-btn-active':'text-muted hover:text-main'" aria-pressed="true">EN</button>
        <button @click="switchLang('ru')" class="px-3 py-1.5 transition-all" :class="lang==='ru'?'lang-btn-active':'text-muted hover:text-main'" aria-pressed="false">RU</button>
      </div>
      <!-- Dark toggle -->
      <template x-if="C.settings.enableDarkMode">
        <button @click="dark=!dark"
                class="w-9 h-9 rounded-full flex items-center justify-center text-base transition-all duration-300 hover:scale-110 border-soft bg-card"
                :aria-label="dark?'Switch to light mode':'Switch to dark mode'">
          <span x-text="dark?'☀️':'🌙'"></span>
        </button>
      </template>
    </div>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════════
     HERO
═══════════════════════════════════════════════════════════ -->
<section id="hero" class="relative min-h-screen flex items-center overflow-hidden pt-20"
         :style="dark?'background:var(--bg-d)':'background:linear-gradient(165deg,#FFFAF4 0%,#FFF0E8 55%,rgba(255,78,156,.07) 100%)'">

  <!-- Ambient orbs -->

  <div class="orb" style="width:360px;height:360px;background:radial-gradient(circle,rgba(255,78,156,.32),transparent 70%);bottom:-80px;left:-60px;animation-duration:11s;animation-delay:3s;" aria-hidden="true"></div>
  <div class="orb" style="width:220px;height:220px;background:radial-gradient(circle,rgba(255,212,59,.42),transparent 70%);top:42%;left:42%;animation-duration:9s;animation-delay:1.5s;" aria-hidden="true"></div>

  <!-- Floating emoji particles -->
  <template x-for="(em,i) in ['🍜','🌴','⭐','🍣','🥭','🔥']">
    <div class="e-particle" aria-hidden="true"
         :style="`left:${[6,88,15,80,5,91][i]}%;top:${[18,22,72,68,44,55][i]}%;animation-duration:${5+i*1.2}s;animation-delay:${i*.7}s;`"
         x-text="em"></div>
  </template>

  <div class="max-w-7xl mx-auto px-6 py-24 w-full">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">

      <!-- TEXT -->
      <div class="order-2 lg:order-1">
        <div class="h-in1 mb-5">
          <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold"
                style="background:linear-gradient(135deg,rgba(0,212,200,.15),rgba(155,77,255,.12));color:var(--turq);border:1.5px solid rgba(0,212,200,.25);"
                x-text="T('hero_badge')"></span>
        </div>

        <!-- H1 — most important SEO heading -->
        <h1 class="ff-fraunces font-black leading-[1.04] mb-3 h-in2 text-main"
            style="font-size:clamp(2.4rem,5.5vw,5rem);"
            x-text="T('hero_h1')"></h1>

        <p class="ff-caveat h-in3 mb-5" style="font-size:2.1rem;color:var(--coral);"
           x-text="T('hero_accent')"></p>

        <p class="h-in4 text-lg leading-relaxed mb-10 max-w-md text-muted"
           x-text="T('hero_sub')"></p>

        <div class="h-in5 flex flex-wrap gap-4">
          <a href="#contact"
             class="flex items-center gap-2 px-7 py-3.5 rounded-full font-bold text-white text-base transition-all duration-300 hover:scale-105 hover:-translate-y-1"
             style="background:linear-gradient(135deg,var(--coral),var(--pink));box-shadow:0 10px 36px rgba(255,107,107,.38);"
             x-text="T('hero_cta1')"></a>
          <a href="#mediakit"
             class="flex items-center gap-2 px-7 py-3.5 rounded-full font-bold text-base border-2 transition-all duration-300 hover:scale-105 hover:-translate-y-1 border-soft text-main"
             x-text="T('hero_cta2')"></a>
        </div>

        <!-- Quick stats -->
        <div class="h-in5 flex gap-8 mt-12 flex-wrap">
          <div>
            <div class="ff-fraunces font-black text-3xl gt-coral">47K+</div>
            <div class="text-xs font-semibold mt-0.5 text-muted" x-text="T('hero_stat_followers')"></div>
          </div>
          <div class="w-px" :class="dark?'bg-white/10':'bg-black/10'"></div>
          <div>
            <div class="ff-fraunces font-black text-3xl gt-coral">200+</div>
            <div class="text-xs font-semibold mt-0.5 text-muted" x-text="T('hero_stat_restaurants')"></div>
          </div>
          <div class="w-px" :class="dark?'bg-white/10':'bg-black/10'"></div>
          <div>
            <div class="ff-fraunces font-black text-3xl gt-coral">8.4%</div>
            <div class="text-xs font-semibold mt-0.5 text-muted" x-text="T('hero_stat_engagement')"></div>
          </div>
        </div>
      </div>

      <!-- HERO IMAGE -->
      <div class="order-1 lg:order-2 relative flex justify-center">
        <!-- Spinning halo -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none" aria-hidden="true">
          <div class="rounded-full opacity-30"
               style="width:440px;height:440px;background:conic-gradient(from 0deg,var(--coral),var(--pink),var(--purple),var(--turq),var(--gold),var(--coral));filter:blur(5px);animation:rotBorder 9s linear infinite;"></div>
        </div>

        <div class="relative z-10 hero-img">
          <!-- TOP CRITIC badge -->
          <div class="badge-pop absolute -top-5 -right-5 z-20 flex flex-col items-center justify-center"
               style="width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--mango));box-shadow:0 10px 28px rgba(255,149,0,.5);"
               aria-label="Top Critic Award">
            <span class="text-2xl leading-none" aria-hidden="true">⭐</span>
            <span class="ff-fraunces font-black text-center leading-tight" style="font-size:.58rem;color:#1a1000;">TOP<br>CRITIC</span>
          </div>

          <img :src="C.images.hero"
               alt="Vasilisa Chugunova — Phuket's youngest food critic and mukbang creator"
               loading="eager"
               width="430" height="530"
               style="width:430px;max-width:100%;height:530px;object-fit:cover;object-position:top;border-radius:48% 52% 60% 40%/45% 42% 58% 55%;border:5px solid rgba(255,255,255,.9);box-shadow:0 50px 100px rgba(255,107,107,.2);" />

          <!-- Floating chips -->
          <div class="absolute -bottom-4 -left-7 z-20 flex items-center gap-2 px-4 py-2.5 rounded-2xl bg-card border-soft shadow-soft"
               style="animation:imgFloat 6s ease-in-out 1s infinite;" aria-hidden="true">
            <span class="text-xl">🍜</span>
            <div>
              <div class="ff-fraunces font-black text-sm text-main">Phuket</div>
              <div class="text-xs text-muted">Based here</div>
            </div>
          </div>
          <div class="absolute top-1/3 -left-10 z-20 px-3 py-2 rounded-xl text-sm font-bold text-white"
               style="background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 8px 24px rgba(155,77,255,.4);animation:imgFloat 8s ease-in-out 2s infinite;" aria-hidden="true">
            🎬 300+ Videos
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll cue -->
  <div class="absolute bottom-20 left-1/2 -translate-x-1/2 flex flex-col items-center gap-1.5 opacity-40" style="animation:imgFloat 2.5s ease-in-out infinite;" aria-hidden="true">
    <span class="text-xs font-semibold text-muted tracking-widest uppercase">Scroll</span>
    <svg width="18" height="22" viewBox="0 0 18 22" fill="none"><path d="M9 1v14M3 13l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <!-- Ticker stripe -->
  <div class="tick-wrap absolute bottom-0 left-0 right-0 overflow-hidden py-3.5"
       style="background:linear-gradient(90deg,var(--coral),var(--pink),var(--purple));" aria-hidden="true">
    <div class="tick-track">
      <template x-for="j in 2">
        <div class="flex items-center">
          <template x-for="item in T('ticker1')">
            <span class="flex items-center gap-2 text-white text-sm font-bold whitespace-nowrap" style="padding:0 2.2rem;">
              <span x-text="item.icon"></span>
              <span x-text="item.text"></span>
              <span style="opacity:.35;font-size:.7rem;">✦</span>
            </span>
          </template>
        </div>
      </template>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════
     ABOUT
═══════════════════════════════════════════════════════════ -->
<section id="about" class="py-32 overflow-hidden"
         :style="dark?'background:var(--bg-d)':'background:#FFFAF4'">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">

      <!-- Photo collage -->
      <div class="rv-left relative h-[540px]">
        <img :src="C.images.about1"
             alt="Vasilisa Chugunova tasting authentic Thai food at a Phuket restaurant"
             loading="lazy" width="268" height="350"
             style="position:absolute;top:0;left:0;width:268px;height:350px;object-fit:cover;border-radius:28px;border:4px solid white;box-shadow:0 28px 60px rgba(255,107,107,.18);"/>
        <img :src="C.images.about2"
             alt="Interior of a Phuket restaurant reviewed by Vasilisa"
             loading="lazy" width="248" height="316"
             style="position:absolute;bottom:0;right:0;width:248px;height:316px;object-fit:cover;border-radius:28px;border:4px solid white;box-shadow:0 28px 60px rgba(0,0,0,.14);"/>
        <!-- Quote bubble -->
        <div class="absolute z-10 max-w-[196px] p-4 rounded-2xl"
             style="bottom:130px;left:200px;background:linear-gradient(135deg,var(--coral),var(--pink));color:white;box-shadow:0 16px 44px rgba(255,107,107,.4);">
          <p class="ff-caveat text-base leading-snug" x-text="T('about_quote')"></p>
          <p class="text-xs mt-1 opacity-75" x-text="T('about_quoteBy')"></p>
        </div>
        <div class="absolute top-5 right-7 z-10 px-3 py-1.5 rounded-xl text-sm font-bold bg-card border-soft shadow-soft text-main"
             x-text="T('about_flag')"></div>
      </div>

      <!-- Content -->
      <div class="rv-right">
        <div class="s-pill mb-5" x-text="T('about_pill')"></div>

        <h2 class="ff-fraunces font-black leading-[1.1] mb-6 text-main" style="font-size:clamp(2rem,4vw,3.2rem);">
          <span class="block" x-text="T('about_h2a')"></span>
          <span class="block" x-text="T('about_h2b')"></span>
          <span class="block gt-trio" x-text="T('about_h2c')"></span>
        </h2>

        <p class="text-lg leading-relaxed mb-4 text-muted" x-text="T('about_p1')"></p>
        <p class="text-lg leading-relaxed mb-6 text-muted" x-text="T('about_p2')"></p>

        <!-- Fact cards -->
        <div class="grid grid-cols-2 gap-4 mt-6 stg">
          <template x-for="[label_k, val_k, icon] in [
            ['fact_location_label','fact_location_val','🌊'],
            ['fact_age_label','fact_age_val','🎂'],
            ['fact_rest_label','fact_rest_val','🍜'],
            ['fact_vid_label','fact_vid_val','🎬']
          ]">
            <div class="rv-up flex items-center gap-3 p-4 rounded-2xl tilt bg-card border-soft shadow-soft">
              <span class="text-2xl" x-text="icon"></span>
              <div>
                <div class="font-bold text-sm text-main" x-text="T(val_k)"></div>
                <div class="text-xs text-muted" x-text="T(label_k)"></div>
              </div>
            </div>
          </template>
        </div>

        <!-- Skill bars -->
        <div class="mt-8 space-y-4">
          <template x-for="[key, pct, color] in [['skill1',98,'coral'],['skill2',92,'pink'],['skill3',87,'turq']]">
            <div>
              <div class="flex justify-between mb-1.5">
                <span class="text-sm font-bold text-main" x-text="T(key)"></span>
                <span class="text-sm text-muted" x-text="pct+'%'"></span>
              </div>
              <div class="prog-bar">
                <div class="prog-fill rounded-full"
                     :style="`background:var(--${color});`"
                     x-data="{p:pct}"
                     x-intersect.once="$nextTick(()=>{$el.classList.add('go');$el.style.scale=`${p/100} 1`})"></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════
     ACHIEVEMENTS
═══════════════════════════════════════════════════════════ -->
<section id="achievements" class="py-28 overflow-hidden relative"
         :style="dark?'background:#111015':'background:linear-gradient(135deg,#FFFAF4,rgba(255,78,156,.05))'">

  <div class="absolute inset-0 flex items-center justify-center overflow-hidden pointer-events-none select-none" aria-hidden="true">
    <span class="ff-fraunces font-black text-main" style="font-size:38vw;opacity:.024;line-height:1;">47K</span>
  </div>

  <div class="max-w-7xl mx-auto px-6 relative z-10">
    <div class="text-center mb-16 rv-up">
      <div class="s-pill mb-4 mx-auto w-fit" x-text="T('ach_pill')"></div>
      <h2 class="ff-fraunces font-black text-main" style="font-size:clamp(2rem,5vw,3.8rem);">
        <span x-text="T('ach_h2a')"></span><span class="gt-warm" x-text="T('ach_h2b')"></span>
      </h2>
    </div>

    <!-- Animated stat cards -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-5 mb-20 stg">
      <template x-for="stat in C.stats">
        <div class="rv-scale tilt text-center p-6 rounded-2xl bg-card border-soft shadow-soft">
          <div class="text-3xl mb-2" x-text="stat.icon" aria-hidden="true"></div>
          <div class="ff-fraunces font-black text-2xl gt-coral mb-1"
               x-data="ctr(stat.val)"
               x-intersect.once="go()"
               x-text="display"></div>
          <div class="text-xs font-semibold text-muted" x-text="lang==='ru'?stat.ru:stat.en"></div>
        </div>
      </template>
    </div>

    <!-- Award cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-20 stg">
      <template x-for="[icon, tk, sk] in [['🏆','aw1_title','aw1_sub'],['📺','aw2_title','aw2_sub'],['📰','aw3_title','aw3_sub']]">
        <div class="rv-up p-6 rounded-2xl tilt bg-card border-soft shadow-soft">
          <div class="text-4xl mb-3" x-text="icon" aria-hidden="true"></div>
          <h3 class="ff-fraunces font-bold text-xl mb-1 text-main" x-text="T(tk)"></h3>
          <p class="text-sm text-muted" x-text="T(sk)"></p>
        </div>
      </template>
    </div>
  </div>

  <!-- Ticker 1 (gold, angled) -->
  <div class="tick-wrap overflow-hidden py-1 my-2" style="rotate:-1.5deg;margin:-8px 0;" aria-hidden="true">
    <div class="py-4" style="background:linear-gradient(90deg,var(--gold),var(--mango),var(--coral));">
      <div class="tick-track">
        <template x-for="j in 2">
          <div class="flex items-center">
            <template x-for="item in T('ticker1')">
              <span class="flex items-center gap-3 text-gray-900 text-sm font-black whitespace-nowrap uppercase tracking-wider" style="padding:0 2.2rem;">
                <span class="inline-flex items-center justify-center w-6 h-6 rounded-full text-xs" style="background:rgba(0,0,0,.15);" x-text="item.icon"></span>
                <span x-text="item.text"></span>
                <span style="opacity:.25;font-size:1.1rem;">✦</span>
              </span>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Ticker 2 (pink, reverse) -->
  <div class="tick-wrap overflow-hidden py-1 my-2" style="rotate:1.5deg;margin:-8px 0;" aria-hidden="true">
    <div class="py-3.5" style="background:linear-gradient(90deg,var(--pink),var(--purple),var(--pink));">
      <div class="tick-track-rev">
        <template x-for="j in 2">
          <div class="flex items-center">
            <template x-for="item in T('ticker2')">
              <span class="flex items-center gap-2 text-white text-sm font-bold whitespace-nowrap uppercase tracking-widest" style="padding:0 1.8rem;">
                <span x-text="item.icon"></span>
                <span x-text="item.text"></span>
                <span style="opacity:.3;font-size:.65rem;">◆</span>
              </span>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>
</section>

     SOCIAL MEDIA
═══════════════════════════════════════════════════════════ -->
<section id="socials" class="py-32 overflow-hidden" :style="dark?'background:var(--bg-d)':'background:#FFFAF4'">
  <div class="max-w-7xl mx-auto px-6">
    <div class="text-center mb-16 rv-up">

<!-- ═══════════════════════════════════════════════════════════
     CONTACT / WORK WITH US
═══════════════════════════════════════════════════════════ -->
<section id="contact" class="py-32 overflow-hidden" :style="dark?'background:#111015':'background:white'">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-start">

      <!-- Info -->
      <div class="rv-left">
        <div class="s-pill mb-5" x-text="T('ct_pill')"></div>
        <h2 class="ff-fraunces font-black leading-[1.1] mb-6 text-main" style="font-size:clamp(2rem,4vw,3.2rem);">
          <span class="block" x-text="T('ct_h2a')"></span>
          <span class="block gt-coral" x-text="T('ct_h2b')"></span>
        </h2>
        <p class="text-lg leading-relaxed mb-10 text-muted" x-text="T('ct_body')"></p>

        <!-- Contact pills -->
        <div class="space-y-4">
          <template x-for="[lk, val, href] in [
            ['ct_email', C.contact.email, 'mailto:'+C.contact.email],
            ['ct_tg', C.contact.telegram, 'https://t.me/'+C.contact.telegram.replace('@','')],
            ['ct_wa', C.contact.whatsapp, '#'],
            ['ct_loc', C.contact.location, '']
          ]">
            <component :is="href?'a':'div'"
                       :href="href||undefined"
                       class="flex items-center gap-4 p-4 rounded-2xl tilt bg-card border-soft shadow-soft"
                       style="text-decoration:none;">
              <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
                   style="background:rgba(255,107,107,.1);">
                <span :x-text="['📧','💬','📱','🌴'][$index]" aria-hidden="true"></span>
              </div>
              <div>
                <div class="text-sm font-bold text-main" x-text="T(lk)"></div>
                <div class="text-sm" style="color:var(--coral);" x-text="val"></div>
              </div>
            </component>
          </template>
        </div>
      </div>

      <!-- Form (Formspree) -->
      <div class="rv-right"
           x-data="{
             name:'', brand:'', email:'', format:'', msg:'',
             state:'idle',
             async submit(){
               if(!this.name||!this.brand||!this.email){return;}
               this.state='loading';
               try {
                 const r = await fetch(C.settings.formspreeEndpoint, {
                   method:'POST',
                   headers:{'Content-Type':'application/json','Accept':'application/json'},
                   body:JSON.stringify({name:this.name,brand:this.brand,email:this.email,format:this.format,message:this.msg})
                 });
                 this.state = r.ok ? 'success' : 'error';
               } catch(e) { this.state='error'; }
             }
           }">

        <!-- Form card -->
        <div x-show="state!=='success'"
             x-transition:leave="opacity-0 scale-95 transition duration-300"
             class="p-8 rounded-3xl bg-card border-soft shadow-soft">
          <h3 class="ff-fraunces font-bold text-2xl mb-6 text-main">
            <span x-text="T('ct_h2a')"></span> <span x-text="T('ct_h2b')"></span>
          </h3>

          <div class="space-y-5">
            <div>
              <label class="block text-sm font-bold mb-1.5 text-main" x-text="T('f_name')"></label>
              <input type="text" x-model="name" class="f-inp" :placeholder="T('f_name_ph')" autocomplete="name" required/>
            </div>
            <div>
              <label class="block text-sm font-bold mb-1.5 text-main" x-text="T('f_brand')"></label>
              <input type="text" x-model="brand" class="f-inp" :placeholder="T('f_brand_ph')" autocomplete="organization"/>
            </div>
            <div>
              <label class="block text-sm font-bold mb-1.5 text-main" x-text="T('f_email')"></label>
              <input type="email" x-model="email" class="f-inp" :placeholder="T('f_email_ph')" autocomplete="email" required/>
            </div>
            <div>
              <label class="block text-sm font-bold mb-1.5 text-main" x-text="T('f_format')"></label>
              <select x-model="format" class="f-inp">
                <option value=""></option>
                <template x-for="opt in T('f_formats')">
                  <option x-text="opt"></option>
                </template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-bold mb-1.5 text-main" x-text="T('f_msg')"></label>
              <textarea x-model="msg" class="f-inp resize-none" rows="4" :placeholder="T('f_msg_ph')"></textarea>
            </div>

            <!-- Error -->
            <p x-show="state==='error'" class="text-sm font-bold" style="color:var(--coral);" x-text="T('f_err')"></p>

            <button @click="submit()" :disabled="state==='loading'"
                    class="w-full py-4 rounded-2xl font-bold text-white text-lg transition-all duration-300"
                    :class="state==='loading'?'opacity-75':'hover:scale-[1.02] hover:-translate-y-1'"
                    style="background:linear-gradient(135deg,var(--coral),var(--pink));box-shadow:0 14px 40px rgba(255,107,107,.32);">
              <span x-text="state==='loading'?T('f_sending'):T('f_submit')"></span>
            </button>
          </div>
        </div>

        <!-- Success -->
        <div x-show="state==='success'"
             x-transition:enter="opacity-0 scale-90 transition-all duration-500"
             x-transition:enter-end="opacity-100 scale-100"
             class="p-14 rounded-3xl text-center bg-card border-soft shadow-soft">
          <div class="text-6xl mb-4" aria-hidden="true">🎉</div>
          <h3 class="ff-fraunces font-bold text-2xl mb-3 text-main" x-text="T('f_ok_title')"></h3>
          <p class="text-muted" x-text="T('f_ok_body')"></p>
        </div>
      </div>
    </div>
  </div>
</section>

      <p class="ff-caveat text-lg" style="color:rgba(255,255,255,.35);" x-text="T('ft_tag')"></p>
    </div>
  </div>
</footer>

<!-- ═══════════════════════════════════════════════════════════
     ALPINE.JS APP
═══════════════════════════════════════════════════════════ -->
<script>
document.addEventListener('alpine:init', () => {

  /* ── Animated counter component ── */
  Alpine.data('ctr', rawVal => ({
    display: rawVal, started: false,
    go() {
      if (this.started) return;
      this.started = true;
      const raw = String(rawVal);
      const num = parseFloat(raw.replace(/[^0-9.]/g,''));
      const sfx = raw.replace(/[0-9.]/g,'');
      const dur = 1700, t0 = performance.now();
      const tick = now => {
        const p = Math.min((now-t0)/dur,1);
        const e = 1-Math.pow(2,-10*p);
        const v = num*e;
        this.display = (Number.isInteger(num)?Math.round(v):v.toFixed(1))+sfx;
        if(p<1) requestAnimationFrame(tick); else this.display=rawVal;
      };
      requestAnimationFrame(tick);
    },
  }));

  /* ── Main App ── */
  Alpine.data('App', () => ({
    C:       window.SITE_CONFIG,
    lang:    localStorage.getItem('vy_lang') || window.SITE_CONFIG.settings.defaultLang,
    dark:    localStorage.getItem('vy_dark')==='1' ||
             (localStorage.getItem('vy_dark')===null && window.matchMedia('(prefers-color-scheme:dark)').matches),
    scrolled:false,

    /* ── Translation helper ── */
    T(key) {
      const d = this.C.i18n[this.lang];
      return (d && d[key] !== undefined) ? d[key] : (this.C.i18n.en[key] || key);
    },

    /* ── Boot: apply CSS vars, update SEO tags ── */
    boot() {
      /* Apply color tokens */
      const clr = this.C.colors;
      const map = {
        coral:clr.coral,turq:clr.turq,pink:clr.pink,purple:clr.purple,
        gold:clr.gold,mango:clr.mango,lime:clr.lime,
        'bg-l':clr.bgLight,'bg-d':clr.bgDark,
        'card-l':clr.cardLight,'card-d':clr.cardDark,
        'text-l':clr.textLight,'text-d':clr.textDark,
      };
      Object.entries(map).forEach(([k,v])=>document.documentElement.style.setProperty(`--${k}`,v));

      /* Initial SEO update */
      this.updateSEO();

      /* Persist prefs */
      this.$watch('dark', v => localStorage.setItem('vy_dark', v?'1':'0'));
      this.$watch('lang', () => { this.updateSEO(); localStorage.setItem('vy_lang', this.lang); });

      /* Tilt effect on .tilt elements */
      this.$nextTick(() => {
        document.querySelectorAll('.tilt').forEach(el => {
          el.addEventListener('mousemove', e => {
            const r=el.getBoundingClientRect();
            const x=(e.clientY-r.top-r.height/2)/(r.height/2)*8;
            const y=(e.clientX-r.left-r.width/2)/(r.width/2)*-8;
            el.style.transform=`perspective(700px) rotateX(${x}deg) rotateY(${y}deg) translateY(-8px)`;
          });
          el.addEventListener('mouseleave',()=>el.style.transform='');
        });
      });
    },

    /* ── Language switcher ── */
    switchLang(l) {
      this.lang = l;
    },

    /* ── Dynamic SEO meta updates ── */
    updateSEO() {
      const t = this.T('meta_title');
      const d = this.T('meta_desc');
      document.documentElement.lang = this.lang;
      document.getElementById('pg-title').textContent   = t;
      document.getElementById('pg-desc').content         = d;
      document.getElementById('og-title').content        = t;
      document.getElementById('og-description').content  = d;
      document.getElementById('tw-title').content        = t;
      document.getElementById('tw-desc').content         = d;
    },

    /* ══════════════════════════════════════════════════════════════
       jsPDF MEDIA KIT GENERATOR
       Builds a 4-page vivid tropical PDF from SITE_CONFIG data.
    ══════════════════════════════════════════════════════════════ */
    generatePDF() {
      if (!window.jspdf) { alert('PDF library loading, please try again.'); return; }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
      const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
      const C=this.C; const isEN=this.lang==='en';

      /* ─ helpers ─ */
      const fill   = (...rgb)           => { doc.setFillColor(...rgb); };
      const stroke = (...rgb)           => { doc.setDrawColor(...rgb); };
      const fc     = (sz,bold,clr=[0,0,0]) => { doc.setFontSize(sz); doc.setFont('helvetica',bold?'bold':'normal'); doc.setTextColor(...clr); };
      const rr     = (x,y,w,h,r,mode)  => doc.roundedRect(x,y,w,h,r,r,mode||'F');

      /* ═════════════════ PAGE 1: VIVID COVER ═════════════════ */
      fill(255,107,107);  doc.rect(0,0,W,H,'F');
      fill(255,78,156);   doc.circle(W+20,-20,80,'F');
      fill(155,77,255);   doc.circle(-20,H+20,60,'F');
      fill(255,212,59,0.4);doc.circle(W/2,H/2,100,'F');
      fill(255,82,82,0.25);doc.circle(20,H-40,50,'F');
      fill(0,212,200,0.18);doc.circle(W-25,H/3,40,'F');

      /* White frosted card */
      fill(255,255,255,0.16); rr(12,32,W-24,H-64,12,'F');

      /* Brand name */
      fc(10,true,[255,255,255]); doc.text('VASILISA YUMMY  ·  MEDIA KIT 2025', W/2, 28, {align:'center'});
      fc(40,true,[255,255,255]);
      doc.text('Vasilisa',  W/2, 70, {align:'center'});
      doc.text('Chugunova', W/2, 88, {align:'center'});
      fc(14,false,[255,255,255,0.9]);
      doc.text(isEN?"Phuket's Youngest Food Critic":"Самый молодой ресторанный критик", W/2, 100, {align:'center'});

      /* Divider */
      stroke(255,255,255,0.45); doc.setLineWidth(.5);
      doc.line(30,106,W-30,106);

      /* Media Kit title */
      fc(26,true,[255,255,255]);
      doc.text(isEN?'MEDIA KIT 2025':'МЕДИАКИТ 2025', W/2, 120, {align:'center'});

      /* Stats mini-cards */
      const sts=[
        {v:'47K+',l:isEN?'Followers':'Подписчиков'},
        {v:'200+',l:isEN?'Restaurants':'Ресторанов'},
        {v:'8.4%',l:isEN?'Engagement':'Вовлечённость'},
        {v:'28',  l:isEN?'Cities':'Городов'},
      ];
      const bW=39,bH=24,bG=4;
      const bX=(W-(sts.length*(bW+bG)-bG))/2;
      sts.forEach((s,i)=>{
        const x=bX+i*(bW+bG);
        fill(255,255,255,0.22); rr(x,132,bW,bH,4,'F');
        fc(15,true,[255,255,255]); doc.text(s.v,x+bW/2,132+11,{align:'center'});
        fc(7,false,[255,255,255]); doc.text(s.l,x+bW/2,132+20,{align:'center'});
      });

      /* Quote */
      fc(13,false,[255,255,255]);
      const q=isEN?'"If it\'s bad — I\'ll say it\'s bad."':'"Если невкусно — скажу, что невкусно."';
      doc.text(q,W/2,170,{align:'center'});
      fc(10,false,[255,255,255,0.7]);
      doc.text(isEN?'— Vasilisa, Age 8':'— Василиса, 8 лет',W/2,179,{align:'center'});

      /* Contact footer strip */
      fill(0,0,0,0.22); doc.rect(0,H-28,W,28,'F');
      fc(11,true,[255,255,255]);
      doc.text(C.contact.email,W/2,H-17,{align:'center'});
      fc(9,false,[255,255,255,0.7]);
      doc.text('Phuket, Thailand  ·  '+C.contact.telegram,W/2,H-9,{align:'center'});

      /* ═════════════════ PAGE 2: SOCIAL MEDIA ═════════════════ */
      doc.addPage();
      fill(255,248,244); doc.rect(0,0,W,H,'F');
      fill(255,107,107); doc.rect(0,0,W,22,'F');
      fc(12,true,[255,255,255]); doc.text(isEN?'SOCIAL MEDIA PERFORMANCE':'ПОКАЗАТЕЛИ В СОЦСЕТЯХ',W/2,14,{align:'center'});

      let yy=32;
      fc(20,true,[28,16,32]); doc.text(isEN?'Social Media Breakdown':'Соцсети',14,yy); yy+=14;

      const sClrs={YouTube:[255,0,51],Instagram:[131,58,180],TikTok:[1,1,1],Facebook:[24,119,242]};
      C.socials.forEach(s=>{
        const col=sClrs[s.name]||[255,107,107];
        fill(...col); rr(14,yy,W-28,30,5,'F');
        fc(13,true,[255,255,255]); doc.text(s.name,22,yy+11);
        fc(8,false,[255,255,255]); doc.text(s.handle,22,yy+21);
        fc(16,true,[255,255,255]); doc.text(s.followers,W-64,yy+13);
        fc(7,false,[255,255,255]); doc.text(isEN?'followers':'подписчиков',W-64,yy+21);
        fc(13,true,[255,255,255]); doc.text(s.engagement,W-24,yy+13,{align:'right'});
        fc(7,false,[255,255,255]); doc.text('ER',W-24,yy+21,{align:'right'});
        yy+=36;
      });

      /* ═════════════════ PAGE 3: AUDIENCE ═════════════════ */
      doc.addPage();
      fill(255,248,244); doc.rect(0,0,W,H,'F');
      fill(155,77,255); doc.rect(0,0,W,22,'F');
      fc(12,true,[255,255,255]); doc.text(isEN?'AUDIENCE & DEMOGRAPHICS':'АУДИТОРИЯ',W/2,14,{align:'center'});

      yy=34;
      fc(18,true,[28,16,32]); doc.text(isEN?'Audience Split':'Аудитория',14,yy); yy+=12;

      fc(10,true,[100,80,120]); doc.text(isEN?'Geography':'География',14,yy); yy+=8;
      C.mediakit.audience.forEach(seg=>{
        fc(8,false,[80,60,100]); doc.text(seg.label,14,yy+5);
        fill(220,210,230); rr(58,yy,100,7,2,'F');
        fill(...seg.color); rr(58,yy,seg.pct,7,2,'F');
        fc(8,true,[80,60,100]); doc.text(seg.pct+'%',162,yy+6);
        yy+=13;
      });

      yy+=8;
      fc(10,true,[100,80,120]); doc.text(isEN?'Age Breakdown':'Возраст',14,yy); yy+=8;
      C.mediakit.ageGroups.forEach(ag=>{
        fc(8,false,[80,60,100]); doc.text(ag.range,14,yy+5);
        fill(220,210,230); rr(44,yy,100,7,2,'F');
        fill(255,107,107); rr(44,yy,ag.pct*2,7,2,'F');
        fc(8,true,[80,60,100]); doc.text(ag.pct+'%',148,yy+6);
        yy+=13;
      });

      yy+=6;
      fill(255,212,59,0.18); rr(14,yy,W-28,16,4,'F');
      fc(9,true,[100,70,0]);
      doc.text(C.mediakit.cpmText+(isEN?' starting':''),W/2,yy+11,{align:'center'});

      /* ═════════════════ PAGE 4: FORMATS & CASES ═════════════════ */
      doc.addPage();
      fill(255,248,244); doc.rect(0,0,W,H,'F');
      fill(255,78,156); doc.rect(0,0,W,22,'F');
      fc(12,true,[255,255,255]); doc.text(isEN?'FORMATS & CASE STUDIES':'ФОРМАТЫ И КЕЙСЫ',W/2,14,{align:'center'});

      yy=34;
      fc(18,true,[28,16,32]); doc.text(isEN?'Collaboration Formats':'Форматы',14,yy); yy+=12;
      const fmts=isEN?C.mediakit.formats_en:C.mediakit.formats_ru;
      fmts.forEach((f,i)=>{
        const c2=[[255,107,107],[255,78,156],[155,77,255],[0,212,200],[255,212,59],[127,217,87]];
        fill(...(c2[i]||[255,107,107])); rr(14,yy,W-28,13,3,'F');
        fc(9,true,[255,255,255]); doc.text(f,22,yy+9);
        yy+=18;
      });

      yy+=6;
      fc(18,true,[28,16,32]); doc.text(isEN?'Success Stories':'Кейсы',14,yy); yy+=12;
      C.mediakit.successCases.forEach(cs=>{
        fill(255,107,107,0.08); rr(14,yy,W-28,26,4,'F');
        stroke(255,107,107); doc.setLineWidth(.5); rr(14,yy,W-28,26,4,'D');
        fc(10,true,[80,30,80]); doc.text(cs.brand,22,yy+11);
        fc(8,false,[100,60,100]); doc.text(isEN?cs.en:cs.ru,22,yy+20);
        yy+=32;
      });

      /* Footer on every page */
      for(let p=1;p<=4;p++){
        doc.setPage(p);
        doc.setFontSize(7.5); doc.setTextColor(160,140,160);
        doc.text(`Vasilisa Yummy  ·  ${C.contact.email}  ·  Phuket, Thailand`,W/2,H-7,{align:'center'});
      }

      doc.save(C.mediakit.pdfFilename);
    },

  }));

});
</script>

</body>
</html>
